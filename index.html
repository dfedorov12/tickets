<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DIHAG · Tickets Liste (Debug)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a1f3c; --red:#c0392b; --blue:#2563eb; --green:#16a34a;
  --yellow:#d97706; --bg:#f2f4f7; --border:rgba(10,31,60,.1);
  --text:#1a2942; --text-dim:#6b7a8f; --text-muted:#9ba8b8;
}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);padding:20px;}
.container{max-width:1400px;margin:0 auto;background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(10,31,60,.09);}
header{padding:20px 24px;border-bottom:2px solid var(--border);background:var(--navy);color:#fff;border-radius:12px 12px 0 0;}
h1{font-size:24px;margin-bottom:8px;}
.subtitle{font-size:13px;opacity:.7;}
.debug-panel{background:#1a1a1a;color:#00ff00;padding:16px;margin:20px 24px;border-radius:8px;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;max-height:400px;overflow:auto;border:2px solid #333;}
.debug-title{color:#ffff00;font-weight:700;margin-bottom:8px;font-size:13px;}
.debug-line{margin:2px 0;}
.debug-step{color:#00ccff;}
.debug-data{color:#ff9500;margin-left:20px;}
.toolbar{padding:16px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.search-input{flex:1;max-width:400px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;}
.btn{padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:none;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border);}
.table-wrap{padding:0 24px 24px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{padding:12px 14px;text-align:left;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:2px solid var(--border);background:#fafbfc;position:sticky;top:0;}
td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13px;}
tr:hover td{background:rgba(10,31,60,.02);}
.badge{display:inline-flex;padding:4px 10px;border-radius:12px;font-size:10px;font-weight:700;white-space:nowrap;}
.status-offen{background:rgba(37,99,235,.1);color:var(--blue);}
.status-bearbeitung{background:rgba(217,119,6,.1);color:var(--yellow);}
.status-erledigt{background:rgba(22,163,74,.1);color:var(--green);}
.status-abgebrochen{background:rgba(107,114,128,.1);color:#4b5563;}
.prio-hoch{color:var(--red);font-weight:700;}
.prio-kritisch{color:var(--red);font-weight:700;text-decoration:underline;}
.stats{padding:16px 24px;border-top:2px solid var(--border);display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;}
.stat-card{padding:14px;background:var(--bg);border-radius:8px;border-left:4px solid var(--blue);}
.stat-label{font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.stat-value{font-size:24px;font-weight:700;color:var(--navy);margin-top:4px;}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>🎫 DIHAG Tickets Liste</h1>
    <p class="subtitle">Sortiert nach Erstelldatum (neueste zuerst) • Mit Debug-Ausgabe</p>
  </header>

  <div class="debug-panel" id="debugPanel">
    <div class="debug-title">🐛 DEBUG LOG</div>
    <div id="debugOutput"></div>
  </div>

  <div class="toolbar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Tickets durchsuchen...">
    <button class="btn btn-primary" onclick="sortTickets('erstellt_am', 'desc')">↓ Neueste zuerst</button>
    <button class="btn btn-secondary" onclick="sortTickets('erstellt_am', 'asc')">↑ Älteste zuerst</button>
    <button class="btn btn-secondary" onclick="clearDebug()">🧹 Debug leeren</button>
  </div>

  <div class="table-wrap">
    <table id="ticketsTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Titel</th>
          <th>Status</th>
          <th>Priorität</th>
          <th>Ersteller</th>
          <th>Erstellt am</th>
          <th>Bearbeiter</th>
        </tr>
      </thead>
      <tbody id="ticketsBody">
      </tbody>
    </table>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Gesamt</div>
      <div class="stat-value" id="statTotal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Offen</div>
      <div class="stat-value" id="statOffen">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Bearbeitung</div>
      <div class="stat-value" id="statBearbeitung">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Erledigt</div>
      <div class="stat-value" id="statErledigt">0</div>
    </div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// DEBUG HELPER
// ════════════════════════════════════════════════════════════════
function debugLog(message, type = 'info') {
  const output = document.getElementById('debugOutput');
  const timestamp = new Date().toLocaleTimeString('de-DE');
  let className = 'debug-line';
  let prefix = '•';
  
  if (type === 'step') {
    className = 'debug-step';
    prefix = '▶';
  } else if (type === 'data') {
    className = 'debug-data';
    prefix = '  →';
  }
  
  const line = document.createElement('div');
  line.className = className;
  line.textContent = `[${timestamp}] ${prefix} ${message}`;
  output.appendChild(line);
  output.scrollTop = output.scrollHeight;
}

function clearDebug() {
  document.getElementById('debugOutput').innerHTML = '';
  debugLog('Debug-Log geleert', 'info');
}

// ════════════════════════════════════════════════════════════════
// TICKET DATA (Beispieldaten - können durch echte Daten ersetzt werden)
// ════════════════════════════════════════════════════════════════
let tickets = [
  {
    id: 'TKT-001',
    titel: 'Neuer Laptop für Marketing-Team benötigt',
    status: 'Offen',
    prioritaet: 'Hoch',
    ersteller: 'M. Schmidt',
    erstellt_am: '2024-03-20T09:15:00',
    bearbeiter: '-'
  },
  {
    id: 'TKT-002',
    titel: 'E-Mail Probleme bei Outlook Synchronisation',
    status: 'In Bearbeitung',
    prioritaet: 'Kritisch',
    ersteller: 'A. Müller',
    erstellt_am: '2024-03-25T14:30:00',
    bearbeiter: 'IT-Team'
  },
  {
    id: 'TKT-003',
    titel: 'Drucker im 2. OG funktioniert nicht',
    status: 'Erledigt',
    prioritaet: 'Mittel',
    ersteller: 'S. Weber',
    erstellt_am: '2024-03-18T11:45:00',
    bearbeiter: 'H. Fischer'
  },
  {
    id: 'TKT-004',
    titel: 'VPN Zugang für Homeoffice einrichten',
    status: 'Offen',
    prioritaet: 'Hoch',
    ersteller: 'L. Bauer',
    erstellt_am: '2024-03-26T08:00:00',
    bearbeiter: '-'
  },
  {
    id: 'TKT-005',
    titel: 'Software-Update für Buchhaltungssystem',
    status: 'In Bearbeitung',
    prioritaet: 'Mittel',
    ersteller: 'R. Klein',
    erstellt_am: '2024-03-22T16:20:00',
    bearbeiter: 'IT-Team'
  },
  {
    id: 'TKT-006',
    titel: 'Netzwerk-Störung im Erdgeschoss',
    status: 'Erledigt',
    prioritaet: 'Kritisch',
    ersteller: 'J. Hoffmann',
    erstellt_am: '2024-03-19T10:30:00',
    bearbeiter: 'M. Wagner'
  },
  {
    id: 'TKT-007',
    titel: 'Neue Benutzerkonten für Praktikanten',
    status: 'Offen',
    prioritaet: 'Niedrig',
    ersteller: 'P. Meyer',
    erstellt_am: '2024-03-24T13:15:00',
    bearbeiter: '-'
  },
  {
    id: 'TKT-008',
    titel: 'Datensicherung läuft nicht automatisch',
    status: 'In Bearbeitung',
    prioritaet: 'Hoch',
    ersteller: 'T. Schulz',
    erstellt_am: '2024-03-23T15:45:00',
    bearbeiter: 'IT-Team'
  }
];

// ════════════════════════════════════════════════════════════════
// TICKET PROCESSING
// ════════════════════════════════════════════════════════════════
let currentSort = { field: 'erstellt_am', direction: 'desc' };
let filteredTickets = [...tickets];

function sortTickets(field, direction) {
  debugLog(`SORTIERUNG GESTARTET`, 'step');
  debugLog(`Feld: ${field} | Richtung: ${direction}`, 'data');
  
  currentSort = { field, direction };
  
  debugLog(`Anzahl Tickets vor Sortierung: ${filteredTickets.length}`, 'data');
  
  filteredTickets.sort((a, b) => {
    let valA = a[field];
    let valB = b[field];
    
    // Datum-Vergleich
    if (field === 'erstellt_am') {
      valA = new Date(valA).getTime();
      valB = new Date(valB).getTime();
      debugLog(`Vergleiche: ${a.id} (${new Date(a[field]).toLocaleString('de-DE')}) mit ${b.id} (${new Date(b[field]).toLocaleString('de-DE')})`, 'data');
    }
    
    let result = 0;
    if (valA < valB) result = -1;
    if (valA > valB) result = 1;
    
    return direction === 'desc' ? -result : result;
  });
  
  debugLog(`Sortierung abgeschlossen`, 'step');
  debugLog(`Erstes Ticket: ${filteredTickets[0].id} (${new Date(filteredTickets[0].erstellt_am).toLocaleString('de-DE')})`, 'data');
  debugLog(`Letztes Ticket: ${filteredTickets[filteredTickets.length-1].id} (${new Date(filteredTickets[filteredTickets.length-1].erstellt_am).toLocaleString('de-DE')})`, 'data');
  
  renderTickets();
}

function filterTickets(searchTerm) {
  debugLog(`FILTERUNG GESTARTET`, 'step');
  debugLog(`Suchbegriff: "${searchTerm}"`, 'data');
  
  if (!searchTerm.trim()) {
    filteredTickets = [...tickets];
    debugLog(`Kein Suchbegriff - zeige alle ${tickets.length} Tickets`, 'data');
  } else {
    const term = searchTerm.toLowerCase();
    filteredTickets = tickets.filter(t => 
      t.id.toLowerCase().includes(term) ||
      t.titel.toLowerCase().includes(term) ||
      t.status.toLowerCase().includes(term) ||
      t.ersteller.toLowerCase().includes(term) ||
      t.bearbeiter.toLowerCase().includes(term)
    );
    debugLog(`${filteredTickets.length} Tickets gefunden`, 'data');
  }
  
  sortTickets(currentSort.field, currentSort.direction);
}

function renderTickets() {
  debugLog(`RENDERING GESTARTET`, 'step');
  debugLog(`Rendere ${filteredTickets.length} Tickets`, 'data');
  
  const tbody = document.getElementById('ticketsBody');
  tbody.innerHTML = '';
  
  filteredTickets.forEach((ticket, index) => {
    const row = document.createElement('tr');
    
    const statusClass = `status-${ticket.status.toLowerCase().replace(' ', '')}`;
    const prioClass = ticket.prioritaet === 'Hoch' ? 'prio-hoch' : ticket.prioritaet === 'Kritisch' ? 'prio-kritisch' : '';
    
    const erstelltDatum = new Date(ticket.erstellt_am);
    const formatiert = erstelltDatum.toLocaleString('de-DE', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit'
    });
    
    row.innerHTML = `
      <td><strong>${ticket.id}</strong></td>
      <td>${ticket.titel}</td>
      <td><span class="badge ${statusClass}">${ticket.status}</span></td>
      <td><span class="${prioClass}">${ticket.prioritaet}</span></td>
      <td>${ticket.ersteller}</td>
      <td>${formatiert}</td>
      <td>${ticket.bearbeiter}</td>
    `;
    
    tbody.appendChild(row);
    
    if (index < 3) {
      debugLog(`Ticket #${index + 1}: ${ticket.id} | ${formatiert}`, 'data');
    }
  });
  
  if (filteredTickets.length > 3) {
    debugLog(`... und ${filteredTickets.length - 3} weitere`, 'data');
  }
  
  updateStats();
  debugLog(`Rendering abgeschlossen`, 'step');
}

function updateStats() {
  const stats = {
    total: filteredTickets.length,
    offen: filteredTickets.filter(t => t.status === 'Offen').length,
    bearbeitung: filteredTickets.filter(t => t.status === 'In Bearbeitung').length,
    erledigt: filteredTickets.filter(t => t.status === 'Erledigt').length
  };
  
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statOffen').textContent = stats.offen;
  document.getElementById('statBearbeitung').textContent = stats.bearbeitung;
  document.getElementById('statErledigt').textContent = stats.erledigt;
  
  debugLog(`Statistiken aktualisiert: ${stats.total} gesamt, ${stats.offen} offen, ${stats.bearbeitung} in Bearbeitung, ${stats.erledigt} erledigt`, 'data');
}

// ════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ════════════════════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', (e) => {
  filterTickets(e.target.value);
});

// ════════════════════════════════════════════════════════════════
// INITIALIZATION
// ════════════════════════════════════════════════════════════════
debugLog('═══════════════════════════════════════════', 'step');
debugLog('TICKETSYSTEM INITIALISIERUNG', 'step');
debugLog('═══════════════════════════════════════════', 'step');
debugLog(`Geladene Tickets: ${tickets.length}`, 'data');
debugLog(`Standard-Sortierung: ${currentSort.field} (${currentSort.direction})`, 'data');

// Initial sortieren und anzeigen
sortTickets('erstellt_am', 'desc');

debugLog('═══════════════════════════════════════════', 'step');
debugLog('SYSTEM BEREIT', 'step');
debugLog('═══════════════════════════════════════════', 'step');
</script>

</body>
</html>
