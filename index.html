<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate"/>
<title>DIHAG · Ticketsystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://alcdn.msauth.net/browser/2.38.2/js/msal-browser.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0a1f3c; --navy2:#16345a; --navy3:#1e4a7a;
  --red:#c0392b; --red2:#a93226; --red-bg:rgba(192,57,43,.08);
  --blue:#2563eb; --blue-bg:rgba(37,99,235,.07);
  --green:#16a34a; --green-bg:rgba(22,163,74,.08);
  --yellow:#d97706; --yellow-bg:rgba(217,119,6,.09);
  --orange:#ea580c; --orange-bg:rgba(234,88,12,.09);
  --surface:#fff; --bg:#f2f4f7; --bg2:#eef0f4;
  --border:rgba(10,31,60,.1); --border2:rgba(10,31,60,.18);
  --text:#1a2942; --text-dim:#6b7a8f; --text-muted:#9ba8b8;
  --r-sm:6px; --r:10px; --r-lg:14px;
  --shadow:0 2px 12px rgba(10,31,60,.09); --shadow-sm:0 1px 6px rgba(10,31,60,.06);
}
html,body{height:100%;font-family:Inter,sans-serif;background:var(--bg);color:var(--text);}

/* BOOT */
#boot{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:18px;}
.boot-logo{width:120px;height:auto;filter:brightness(10) saturate(0);}
.boot-title{color:#fff;font-size:22px;font-weight:700;}
.boot-sub{color:rgba(255,255,255,.5);font-size:13px;}
.boot-spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
.boot-err{color:#f87171;font-size:12px;max-width:400px;text-align:center;line-height:1.6;background:rgba(255,255,255,.07);padding:12px 18px;border-radius:8px;}
.boot-btn{padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100%;}

/* HEADER */
header{
  height:48px;background:var(--navy);display:flex;align-items:center;
  padding:0 16px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:100;
}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-brand img{height:28px;filter:brightness(10) saturate(0);}
.hdr-tag{font-size:11px;font-weight:700;background:rgba(255,255,255,.12);
  color:rgba(255,255,255,.7);padding:3px 9px;border-radius:4px;letter-spacing:.04em;}
.hdr-divider{width:1px;height:24px;background:rgba(255,255,255,.12);}
.hdr-nav{display:flex;gap:2px;}
.hdr-tab{background:none;border:none;color:rgba(255,255,255,.5);padding:6px 14px;
  border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.hdr-tab:hover{background:rgba(255,255,255,.1);color:#fff;}
.hdr-tab.on{background:rgba(255,255,255,.15);color:#fff;}
.hdr-right{display:flex;align-items:center;gap:8px;margin-left:auto;}
.hdr-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.85);padding:5px 12px;border-radius:6px;
  font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;}
.hdr-btn:hover{background:rgba(255,255,255,.2);color:#fff;}
.hdr-btn:disabled{opacity:.4;pointer-events:none;}
.hdr-btn.primary{background:var(--red);border-color:var(--red);color:#fff;}
.hdr-btn.primary:hover{background:var(--red2);}
.hdr-av{width:30px;height:30px;border-radius:50%;background:var(--red);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;}

/* CONTENT */
#content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.panel{display:none;flex:1;overflow:hidden;flex-direction:column;}
.panel.active{display:flex;}

/* TICKETS TABLE PANEL */
.tkt-toolbar{padding:12px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-shrink:0;background:#fff;}
.tkt-search{flex:1;max-width:300px;padding:7px 12px;border:1.5px solid var(--border2);
  border-radius:6px;font-family:inherit;font-size:12px;outline:none;}
.tkt-search:focus{border-color:var(--navy);}
.tkt-filter-sel{padding:7px 10px;border:1.5px solid var(--border2);border-radius:6px;
  font-family:inherit;font-size:12px;outline:none;background:#fff;}
.tkt-table-wrap{flex:1;overflow:auto;}
.tkt-table{width:100%;border-collapse:collapse;}
.tkt-table th{padding:9px 14px;text-align:left;font-size:10px;font-weight:700;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;
  border-bottom:2px solid var(--border);background:#fafbfc;position:sticky;top:0;z-index:1;}
.tkt-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;}
.tkt-table tr:hover td{background:rgba(10,31,60,.025);}
.tkt-table tr.clickable{cursor:pointer;}
.st-badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;}
.st-offen{background:var(--blue-bg);color:var(--blue);}
.st-bearbeitung{background:var(--yellow-bg);color:var(--yellow);}
.st-erledigt{background:var(--green-bg);color:var(--green);}
.st-abgebrochen{background:rgba(107,114,128,.1);color:#4b5563;}
.prio-hoch{color:var(--red);font-weight:700;}
.prio-kritisch{color:var(--red);font-weight:700;text-decoration:underline;}
.attach-count{display:inline-flex;align-items:center;gap:4px;font-size:10px;
  background:var(--bg);border:1px solid var(--border);padding:2px 7px;border-radius:4px;}

/* DETAIL SIDEBAR */
.tkt-main{display:flex;flex:1;overflow:hidden;}
.tkt-sidebar{width:440px;flex-shrink:0;border-left:1px solid var(--border);
  background:#fff;display:flex;flex-direction:column;overflow:hidden;
  transform:translateX(100%);transition:transform .2s;position:relative;}
.tkt-sidebar.open{transform:translateX(0);}
.tkt-sidebar-hdr{padding:14px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tkt-sidebar-body{flex:1;overflow:auto;padding:18px;}
.tkt-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-dim);}
.field-row{margin-bottom:14px;}
.field-row label{display:block;font-size:10px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.field-row input,.field-row textarea,.field-row select{
  width:100%;padding:8px 11px;border:1.5px solid var(--border2);border-radius:6px;
  font-family:inherit;font-size:13px;outline:none;background:#fff;transition:border-color .15s;}
.field-row input:focus,.field-row textarea:focus,.field-row select:focus{border-color:var(--navy);}
.field-row textarea{resize:vertical;min-height:80px;}
.sidebar-actions{padding:14px 18px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;}
.btn{padding:8px 18px;border-radius:6px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{background:var(--navy2);}
.btn-danger{background:var(--red-bg);color:var(--red);border:1.5px solid var(--red);}
.btn-ghost{background:none;color:var(--text-dim);border:1.5px solid var(--border);}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
.status-changer{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.status-btn{padding:5px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.status-btn.active{border-color:currentColor;}
.section-title{font-size:11px;font-weight:700;color:var(--navy);
  margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.attach-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;
  background:var(--bg);border:1px solid var(--border);border-radius:6px;
  font-size:11px;cursor:pointer;text-decoration:none;color:var(--text);margin:0 4px 4px 0;}
.attach-pill:hover{background:var(--navy);color:#fff;border-color:var(--navy);}

/* AUTOMATISMEN */
.auto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;padding:24px;}
.auto-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:22px;
  cursor:pointer;transition:all .15s;position:relative;}
.auto-card:hover{box-shadow:0 4px 20px rgba(10,31,60,.1);border-color:var(--navy);transform:translateY(-2px);}
.auto-card-icon{font-size:30px;margin-bottom:12px;}
.auto-card-title{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:5px;}
.auto-card-desc{font-size:12px;color:var(--text-dim);line-height:1.6;}
.auto-card-tag{position:absolute;top:14px;right:14px;font-size:9px;font-weight:700;
  padding:2px 8px;background:var(--red-bg);color:var(--red);border-radius:10px;text-transform:uppercase;}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:500;align-items:center;justify-content:center;}
.modal-ov.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:620px;max-height:90vh;
  overflow:auto;padding:28px;box-shadow:0 12px 48px rgba(0,0,0,.2);}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.modal-title{font-size:17px;font-weight:700;color:var(--navy);}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text-dim);}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:22px;
  padding-top:16px;border-top:1px solid var(--border);}
.form-section{font-size:11px;font-weight:700;color:var(--navy);
  margin:16px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.06em;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-field{display:flex;flex-direction:column;gap:4px;margin-bottom:12px;}
.form-field.full{grid-column:1/-1;}
.form-field label{font-size:11px;font-weight:600;color:var(--navy);}
.form-field label .req{color:var(--red);}
.form-field input,.form-field textarea,.form-field select{
  padding:8px 12px;border:1.5px solid var(--border2);border-radius:6px;
  font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;}
.form-field input:focus,.form-field textarea:focus,.form-field select:focus{border-color:var(--red);}
.form-field textarea{resize:vertical;min-height:88px;}
.checkbox-row{display:flex;align-items:center;gap:10px;padding:8px 0;}
.checkbox-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;}
.checkbox-row label{font-size:13px;cursor:pointer;}

/* SPINNER */
.spinner{width:32px;height:32px;border:3px solid var(--border);
  border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;margin:auto;}
.empty{text-align:center;padding:48px;color:var(--text-dim);font-size:13px;}

/* TOAST */
#toast-c{position:fixed;bottom:20px;right:20px;z-index:9000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--navy);color:#fff;border-radius:8px;font-size:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:all;
  animation:fadeIn .18s ease;max-width:380px;}
.toast.success{background:var(--green);}
.toast.error{background:var(--red);}
.toast.out{animation:fadeOut .22s ease forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes fadeOut{to{opacity:0;transform:translateY(8px)}}
</style>
</head>

  <div class="boot-spinner" id="boot-spinner"></div>
  <div class="boot-title">DIHAG Ticketsystem</div>
  <div class="boot-sub" id="boot-sub">Anmeldung läuft…</div>
  <div class="boot-err" id="boot-err" style="display:none;"></div>
  <button class="boot-btn" id="boot-btn" style="display:none;" onclick="doLogin()">Anmelden</button>
</div>

<script>
// ════════════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════════════
const CLIENT_ID   = '75e627e8-2de0-4ec6-bec9-311757b89e08';
const TENANT_ID   = 'fdb70646-023a-403b-a4b9-1f474a935123';
const SCOPES      = ['User.Read','Sites.Read.All','Sites.ReadWrite.All','Files.ReadWrite.All'];
const TICKET_SITE = 'dihag.sharepoint.com:/sites/ticket';

// ════════════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════════════
const $id = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fieldStr = v => {
  if (!v) return '';
  if (typeof v === 'string') {
    // Parse JSON arrays that SP sometimes returns as strings
    if (v.startsWith('[')) {
      try {
        const arr = JSON.parse(v);
        return arr.map(x=>x.LookupValue||x.displayName||x.Title||x.Email||'').filter(Boolean).join(', ');
      } catch {}
    }
    return v;
  }
  if (Array.isArray(v)) return v.map(x=>x.LookupValue||x.displayName||x.Title||x.Email||String(x)).filter(Boolean).join(', ');
  if (typeof v === 'object') return v.LookupValue||v.displayName||v.Title||v.Email||'';
  return String(v);
};
const fmt = s => s ? new Date(s).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}) : '';
const fmtFull = s => s ? new Date(s).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';

function toast(msg,type='info'){
  const ic={success:'✅',error:'❌',info:'ℹ️'};
  const t=document.createElement('div'); t.className='toast '+(type||'');
  t.innerHTML=`<span>${ic[type]||'ℹ️'}</span><span>${esc(msg)}</span>`;
  $id('toast-c').appendChild(t);
  setTimeout(()=>{t.classList.add('out');setTimeout(()=>t.remove(),260);},4000);
}

let msalApp, account;

async function initAuth() {
  // Clear stale MSAL state
  try {
    Object.keys(sessionStorage)
      .filter(k=>k.includes('msal')||k.includes('login')||k.includes('interaction'))
      .forEach(k=>sessionStorage.removeItem(k));
  } catch {}

  const cfg = {
    auth: {
      clientId:    CLIENT_ID,
      authority:  `https://login.microsoftonline.com/${TENANT_ID}`,
      redirectUri: 'https://dfedorov12.github.io/tickets/'
    },
    cache: { cacheLocation:'localStorage', storeAuthStateInCookie:false }
  };
  msalApp = new msal.PublicClientApplication(cfg);
  await msalApp.initialize();
  try { await msalApp.handleRedirectPromise(); } catch {}
  const accounts = msalApp.getAllAccounts();
  if (accounts.length > 0) { account = accounts[0]; return true; }
  return false;
}

async function doLogin() {
  $id('boot-btn').style.display = 'none';
  $id('boot-sub').textContent = 'Popup öffnet sich…';

async function getToken() {
  if (!account) throw new Error('Nicht angemeldet');
  try { return (await msalApp.acquireTokenSilent({scopes:SCOPES,account})).accessToken; }
  catch { return (await msalApp.acquireTokenPopup({scopes:SCOPES,account})).accessToken; }
}

async function getSpToken() {
  const origin = 'https://dihag.sharepoint.com';
  try { return (await msalApp.acquireTokenSilent({scopes:[`${origin}/Sites.ReadWrite.All`],account})).accessToken; }
  catch { return (await msalApp.acquireTokenPopup({scopes:[`${origin}/Sites.ReadWrite.All`],account})).accessToken; }
}

// ════════════════════════════════════════════════════════════════
// GRAPH API
// ════════════════════════════════════════════════════════════════
const API = 'https://graph.microsoft.com/v1.0';

async function gGet(path, headers={}) {
  const tok = await getToken();
  const r = await fetch(API+path, {headers:{Authorization:'Bearer '+tok,...headers}});
  if (!r.ok) throw new Error(`Graph ${r.status}: ${await r.text().catch(()=>'')}`);
  return r.json();
}
async function gPost(path, body) {
  const tok = await getToken();
  const r = await fetch(API+path, {method:'POST',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (!r.ok) throw new Error(`Graph POST ${r.status}: ${await r.text().catch(()=>'')}`);
  return r.json();
}
async function gPatch(path, body) {
  const tok = await getToken();
  const r = await fetch(API+path, {method:'PATCH',headers:{Authorization:'Bearer '+tok,'Content-Type':'application/json'},body:JSON.stringify(body)});
  if (r.status===204) return {};
  if (!r.ok) throw new Error(`Graph PATCH ${r.status}: ${await r.text().catch(()=>'')}`);
  return r.json().catch(()=>({}));
}

async function streamTickets() {
  allTickets=[]; allTicketsComplete=false; displayedCount=100;
  $id('tkt-empty').style.display='block';
  $id('tkt-table').style.display='none';

  // ── DEBUG OVERLAY ────────────────────────────────────────────────
  let dbgEl = $id('stream-dbg');
  if (!dbgEl) {
    dbgEl = document.createElement('div');
    dbgEl.id = 'stream-dbg';
    dbgEl.style.cssText = 'position:fixed;bottom:10px;right:10px;width:460px;max-height:320px;overflow:auto;background:#0a1f3c;color:#7dd3fc;font-size:11px;font-family:monospace;padding:12px;border-radius:8px;z-index:99999;white-space:pre-wrap;';
    const cb = document.createElement('button');
    cb.textContent='✕'; cb.style.cssText='position:sticky;top:0;float:right;background:none;border:none;color:#fff;cursor:pointer;font-size:14px;';
    cb.onclick=()=>dbgEl.remove(); dbgEl.appendChild(cb);
    document.body.appendChild(dbgEl);
  }
  const dbgLines = [];
  const dbg = (...a) => {
    const s = a.join(' ');
    console.log('[TKT]', s);
    dbgLines.push(s);
    dbgEl.childNodes[1] ? dbgEl.childNodes[1].textContent = dbgLines.join('\n')
      : dbgEl.appendChild(document.createTextNode(dbgLines.join('\n')));
  };
  dbg('=== streamTickets START ===');
  dbg('ticketSiteId:', ticketSiteId||'MISSING');
  dbg('ticketListId:', ticketListId||'MISSING');
  // ────────────────────────────────────────────────────────────────

  const CACHE_KEY = `tkt_cache_${ticketListId}`;
  const CACHE_TS  = `tkt_cache_ts_${ticketListId}`;
  const CACHE_AGE = 5 * 60 * 1000; // 5 min

  // ── Show cached data instantly ──────────────────────────────────
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    const ts     = Number(localStorage.getItem(CACHE_TS)||0);
    if (cached && Date.now()-ts < CACHE_AGE) {
      dbg('Cache HIT:', JSON.parse(cached).length, 'tickets, age:', Math.round((Date.now()-ts)/1000)+'s');
      allTickets = JSON.parse(cached);
      buildFilterOptions(allTickets);
      renderTickets(allTickets.slice(0, displayedCount));
      $id('tkt-count').textContent = allTickets.length + ' Tickets (Cache)';
      $id('tkt-empty').style.display = 'none';
      allTicketsComplete = true;
      renderLoadMore();
      console.log('[Tickets] served from cache:', allTickets.length);
      // Refresh in background silently
      refreshInBackground(CACHE_KEY, CACHE_TS);
      return;
    }
  } catch {}

  // ── No cache: fetch first page, show immediately ────────────────
  const neededCols = [
    getCol('title')||'Title', getCol('status')||'Status',
    getCol('prio'), getCol('assignee'), getCol('category'),
    getCol('werk'), getCol('type'), getCol('created'), getCol('email'),
  ].filter(Boolean).join(',');
  const sel = neededCols ? `($select=${neededCols})` : '';
  const base = `/sites/${ticketSiteId}/lists/${ticketListId}/items?$expand=fields${sel}&$top=500`;

  $id('tkt-empty').textContent = 'Lade…';
  try {
    dbg('base URL:', base);
    // Fetch first page
    const first = await gGet(base);
    dbg('First page: ', (first.value||[]).length, 'items, nextLink:', first['@odata.nextLink']?'YES':'NO');
    allTickets = first.value||[];
    allTickets.sort((a,b)=>Number(b.id)-Number(a.id));
    buildFilterOptions(allTickets);
    renderTickets(allTickets.slice(0, displayedCount));
    $id('tkt-count').textContent = allTickets.length + '+ Tickets';
    $id('tkt-empty').style.display = 'none';

    // Collect all nextLinks by pre-fetching pages in parallel batches
    let nextUrl = first['@odata.nextLink']
      ? first['@odata.nextLink'].replace('https://graph.microsoft.com/v1.0','') : null;

    while (nextUrl) {
      dbg('Fetching next page...');
      const batch = [];
      let u = nextUrl;
      for (let i=0; i<4 && u; i++) {
        batch.push(gGet(u));
        // We don't know next nextLink yet — fetch sequentially within batch
        break; // can't parallelise without knowing URLs upfront
      }
      const results = await Promise.all(batch);
      for (const d of results) {
        allTickets = [...allTickets, ...(d.value||[])];
        nextUrl = d['@odata.nextLink']
          ? d['@odata.nextLink'].replace('https://graph.microsoft.com/v1.0','') : null;
      }
      allTickets.sort((a,b)=>Number(b.id)-Number(a.id));
      buildFilterOptions(allTickets);
      if (!filterActive()) {
        renderTickets(allTickets.slice(0, displayedCount));
      }
      $id('tkt-count').textContent = allTickets.length + (nextUrl?'+ …':'') + ' Tickets';
    }

    allTicketsComplete = true;
    renderLoadMore();
    if (filterActive()) filterTickets();

    // Save to cache
    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify(allTickets));
      localStorage.setItem(CACHE_TS, String(Date.now()));
    } catch {}
    console.log('[Tickets] done & cached:', allTickets.length);
    dbg('=== DONE:', allTickets.length, 'tickets ===');

  } catch(e) {
    dbg('ERROR:', e.message);
    dbg('Stack:', e.stack?.split('\n')[1]||'');
    if (allTickets.length) {
      renderTickets(allTickets.slice(0, displayedCount));
    } else {
      $id('tkt-empty').textContent = '⚠ '+e.message;
      $id('tkt-empty').style.color = 'var(--red)';
    }
  }
}

async function refreshInBackground(cacheKey, cacheTsKey) {
  // Silent background refresh — updates cache without changing view
  try {
    const neededCols = [
      getCol('title')||'Title', getCol('status')||'Status',
      getCol('prio'), getCol('assignee'), getCol('category'),
      getCol('werk'), getCol('type'), getCol('created'), getCol('email'),
    ].filter(Boolean).join(',');
    const sel = neededCols ? `($select=${neededCols})` : '';
    const cCreatedColBg = getCol('created');
    const orderFieldBg  = cCreatedColBg || 'createdDateTime';
    let url = `/sites/${ticketSiteId}/lists/${ticketListId}/items?$expand=fields${sel}&$top=500&$orderby=${orderFieldBg} desc`;
    let fresh = [];
    while (url) {
      const d = await gGet(url);
      fresh = [...fresh, ...(d.value||[])];
      url = d['@odata.nextLink']
        ? d['@odata.nextLink'].replace('https://graph.microsoft.com/v1.0','') : null;
    }
    fresh.sort((a,b)=>Number(b.id)-Number(a.id));
    localStorage.setItem(cacheKey, JSON.stringify(fresh));
    localStorage.setItem(cacheTsKey, String(Date.now()));
    // Update view if new tickets arrived
    if (fresh.length !== allTickets.length) {
      allTickets = fresh;
      allTicketsComplete = true;
      buildFilterOptions(allTickets);
      renderTickets(filterActive()?applyFilters(allTickets):allTickets.slice(0,displayedCount));
      $id('tkt-count').textContent = allTickets.length + ' Tickets';
      renderLoadMore();
      toast(`Cache aktualisiert: ${fresh.length} Tickets`, 'success');
    }
  } catch(e) { console.warn('[Tickets] bg refresh:', e.message); }
}

function applyFilters(list) {
  const raw  = ($id('tkt-search').value||'').trim();
  const q    = raw.toLowerCase();
  const st   = $id('tkt-st').value;
  const pr   = $id('tkt-prio').value;
  const kat  = $id('tkt-kat')?.value||'';
  const wrk  = $id('tkt-werk')?.value||'';
  const art  = $id('tkt-art')?.value||'';
  const cStatus=getCol('status')||'Status';
  const cPrio  =getCol('prio');
  const cKat   =getCol('category');
  const cWerk  =getCol('werk');
  const cType  =getCol('type');
  const cTitle =getCol('title')||'Title';
  return list.filter(it=>{
    const f=it.fields||{};
    const idStr=String(it.id);
    const titleStr=(f[cTitle]||f.Title||'').toLowerCase();
    const searchOk=!q||(q.replace(/^#/,'')===idStr)||(idStr.includes(q.replace(/^#/,'')))||titleStr.includes(q);
    return searchOk
      &&(!st||(f[cStatus]||'').includes(st))
      &&(!pr||!cPrio||(f[cPrio]||'').includes(pr))
      &&(!kat||!cKat||(f[cKat]||'')===kat)
      &&(!wrk||!cWerk||(f[cWerk]||'')===wrk)
      &&(!art||!cType||(f[cType]||'')===art);
  });
}

function buildFilterOptions(tickets) {
  const cKat  = getCol('category');
  const cWerk = getCol('werk');
  const cType = getCol('type');
  const sets  = {kat:new Set(), werk:new Set(), art:new Set()};
  tickets.forEach(it=>{
    const f=it.fields||{};
    if(cKat  && f[cKat])  sets.kat.add(String(f[cKat]));
    if(cWerk && f[cWerk]) sets.werk.add(String(f[cWerk]));
    if(cType && f[cType]) sets.art.add(String(f[cType]));
  });
  const fill=(id,set)=>{
    const sel=$id(id); if(!sel) return;
    const cur=sel.value;
    sel.innerHTML='<option value="">'+sel.options[0].text+'</option>';
    [...set].sort().forEach(v=>{ const o=document.createElement('option'); o.value=o.textContent=v; sel.appendChild(o); });
    sel.value=cur;
  };
  fill('tkt-kat',sets.kat); fill('tkt-werk',sets.werk); fill('tkt-art',sets.art);
}

  displayedCount = 100;

    renderLoadMore();
  }
}

async function fetchTicketAttachments(id) {
  const container = document.getElementById('atts-'+id);
  if (!container) return;
  try {
    const spTok = await getSpToken();
    const r = await fetch(
      `https://dihag.sharepoint.com/sites/ticket/_api/web/lists(guid'${ticketListId}')/items(${id})/AttachmentFiles`,
      {headers:{Authorization:'Bearer '+spTok, Accept:'application/json;odata=verbose'}}
    );
    const j = await r.json();
    const files = j?.d?.results||j?.value||[];
    // Update count in table row
    const it = allTickets.find(t=>t.id==id);
    if (it) it._attachCount = files.length;

    container.innerHTML = '';
    if (!files.length) {
      container.innerHTML = '<span style="font-size:11px;color:var(--text-muted);">Keine Anhänge</span>';
      return;
    }
    files.forEach(a=>{
      const url = a.ServerRelativeUrl
        ? 'https://dihag.sharepoint.com'+a.ServerRelativeUrl
        : (a.AbsoluteUri||'#');
      const link = document.createElement('a');
      link.href=url; link.target='_blank'; link.className='attach-pill';
      link.textContent='📎 '+(a.FileName||'Anhang');
      container.appendChild(link);
    });
  } catch(e) {
    if (container) container.innerHTML='<span style="font-size:11px;color:var(--red);">'+esc(e.message)+'</span>';
  }
}

function closeSidebar() { $id('tkt-sidebar').classList.remove('open'); editingId=null; }

async function changeStatus(id, newStatus) {
  if (!ticketSiteId||!ticketListId) return;
  const colStatus=col(['Status'])||'Status';
  try {
    await gPatch(`/sites/${ticketSiteId}/lists/${ticketListId}/items/${id}/fields`, {[colStatus]:newStatus});
    const it = allTickets.find(t=>t.id==id);
    if(it) it.fields[colStatus]=newStatus;
    toast(`Status → ${newStatus}`,'success');
    renderTickets(allTickets);
    openTicketDetail(id); // refresh sidebar
  } catch(e){ toast('Fehler: '+e.message,'error'); }
}

async function saveSidebar(id) {
  const fields={};
  $id('sb-body').querySelectorAll('[data-fk]').forEach(el=>{ fields[el.dataset.fk]=el.value; });
  try {
    await gPatch(`/sites/${ticketSiteId}/lists/${ticketListId}/items/${id}/fields`, fields);
    // Update local cache
    const it=allTickets.find(t=>t.id==id);
    if(it) Object.assign(it.fields, fields);
    toast('Gespeichert ✓','success');
    renderTickets(allTickets);
  } catch(e){ toast('Fehler: '+e.message,'error'); }
}

async function uploadAttachments(files, id) {
  if (!files?.length) return;
  try {
    const spTok=await getSpToken();
    const siteBase='https://dihag.sharepoint.com/sites/ticket';
    for (const f of files) {
      const buf=await f.arrayBuffer();
      const r=await fetch(
        `${siteBase}/_api/web/lists(guid'${ticketListId}')/items(${id})/AttachmentFiles/add(FileName='${encodeURIComponent(f.name)}')`,
        {method:'POST',headers:{Authorization:'Bearer '+spTok,'Content-Type':'application/octet-stream',Accept:'application/json;odata=verbose'},body:buf}
      );
      if(r.ok||r.status===200) toast(`📎 ${f.name} angehängt ✓`,'success');
      else toast(`Upload Fehler ${r.status}`,'error');
    }
    await loadTickets(true);
    openTicketDetail(id);
  } catch(e){ toast('Upload: '+e.message,'error'); }
}

async function confirmDeleteTicket(id) {
  if(!confirm(`Ticket #${id} wirklich löschen?`)) return;
  try {
    const tok=await getToken();
    await fetch(`${API}/sites/${ticketSiteId}/lists/${ticketListId}/items/${id}`,
      {method:'DELETE',headers:{Authorization:'Bearer '+tok}});
    allTickets=allTickets.filter(t=>t.id!=id);
    closeSidebar();
    renderTickets(allTickets);
    toast('Ticket gelöscht','success');
  } catch(e){ toast('Löschen: '+e.message,'error'); }
}

  if(colCat) html+=`<div class="form-field full"><label>Kategorie</label>
    <input data-fk="${colCat}" placeholder="z.B. Hardware, Software, Zugang…"/></div>`;
  if(colDesc) html+=`<div class="form-field full"><label>Beschreibung</label>
    <textarea data-fk="${colDesc}" rows="4" placeholder="Detaillierte Beschreibung…"></textarea></div>`;
  html+=`</div>`;

  $id('tm-body').innerHTML=html;
  $id('ticket-modal').classList.add('open');
}

function closeTicketModal() { $id('ticket-modal').classList.remove('open'); }

async function saveTicket() {
  if(!ticketSiteId||!ticketListId) return;
  const fields={};
  $id('tm-body').querySelectorAll('[data-fk]').forEach(el=>{ if(el.value) fields[el.dataset.fk]=el.value; });
  const titleCol=col(['Titel','Title'])||'Title';
  if(!fields[titleCol]){toast('Bitte Titel angeben','error');return;}
  try {
    await gPost(`/sites/${ticketSiteId}/lists/${ticketListId}/items`,{fields});
    toast('Ticket erstellt ✓','success');
    closeTicketModal();
    await loadTickets(true);
  } catch(e){ toast('Fehler: '+e.message,'error'); }
}

let currentAutoKey=null;

function buildAutoGrid(){
  const grid=$id('auto-grid'); grid.innerHTML='';
  Object.entries(AUTO_FORMS).forEach(([key,form])=>{
    const card=document.createElement('div'); card.className='auto-card';
    card.innerHTML=`<div class="auto-card-icon">${form.icon}</div>
      <div class="auto-card-title">${esc(form.title)}</div>
      <div class="auto-card-desc">${esc(form.desc)}</div>
      <div class="auto-card-tag">${esc(form.tag)}</div>`;
    card.onclick=()=>openAutoForm(key);
    grid.appendChild(card);
  });
}

function openAutoForm(key){
  const form=AUTO_FORMS[key]; if(!form) return;
  currentAutoKey=key;
  $id('am-title').textContent=form.title;
  $id('am-submit').textContent=form.submit;
  const body=$id('am-body'); body.innerHTML='';
  form.sections.forEach(sec=>{
    const sh=document.createElement('div'); sh.className='form-section'; sh.textContent=sec.label;
    body.appendChild(sh);
    const row=document.createElement('div'); row.className='form-row'; body.appendChild(row);
    sec.fields.forEach(f=>{
      const wrap=document.createElement('div');
      wrap.className='form-field'+(f.type==='textarea'||f.type==='checkbox'?f.type==='checkbox'?'':' full':'');
      const def=f.def!==undefined?f.def:'';
      if(f.type==='checkbox'){
        wrap.innerHTML=`<div class="checkbox-row">
          <input type="checkbox" id="af_${f.key}" data-key="${f.key}" ${def?'checked':''}>
          <label for="af_${f.key}">${esc(f.label)}</label></div>`;
      } else if(f.type==='textarea'){
        wrap.style.gridColumn='1/-1';
        wrap.innerHTML=`<label>${esc(f.label)}${f.required?'<span class="req">*</span>':''}</label>
          <textarea data-key="${f.key}" rows="${f.rows||3}" placeholder="${f.placeholder||''}">${esc(String(def))}</textarea>`;
      } else {
        wrap.innerHTML=`<label>${esc(f.label)}${f.required?'<span class="req">*</span>':''}</label>
          <input type="${f.type||'text'}" data-key="${f.key}" value="${esc(String(def))}" placeholder="${f.placeholder||''}"/>`;
      }
      row.appendChild(wrap);
    });
  });
  $id('auto-modal').classList.add('open');
}

function closeAutoModal(){$id('auto-modal').classList.remove('open'); currentAutoKey=null;}

async function submitAutoForm(){
  if(!currentAutoKey) return;
  const form=AUTO_FORMS[currentAutoKey];
  const data={};
  $id('am-body').querySelectorAll('[data-key]').forEach(el=>{
    data[el.dataset.key]=el.type==='checkbox'?el.checked:el.value;
  });
  for(const sec of form.sections){
    for(const f of sec.fields){
      if(f.required&&!data[f.key]){toast('Pflichtfeld: '+f.label,'error');return;}
    }
  }
  try{ await form.onSubmit(data); closeAutoModal(); }
  catch(e){ toast('Fehler: '+e.message,'error'); }
}
